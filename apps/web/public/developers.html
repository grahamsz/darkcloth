<!doctype html>
<html lang="en">
  <head>
    <title>Darkcloth API - Film API Reference</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Darkcloth OpenAPI reference for the Darkcloth Film API."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;750&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        color-scheme: light;
        --cloth: #151110;
        --cloth-2: #1d1714;
        --ink: #1d1714;
        --muted: #685f56;
        --paper: #f4eadf;
        --panel: #fbf7f1;
        --line: #d7c6b1;
        --accent: #30473f;
        --accent-strong: #b45a31;
        --warm: #9a7538;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 0%, rgba(180, 94, 49, 0.18), transparent 28%),
          radial-gradient(circle at 82% 0%, rgba(48, 71, 63, 0.2), transparent 24%),
          linear-gradient(180deg, var(--cloth) 0, #110f0d 46%, #0d0b0a 100%);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .docs-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .docs-header {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 20px;
        padding: 18px 24px 16px;
        border-bottom: 1px solid rgba(215, 198, 177, 0.18);
        background: linear-gradient(180deg, rgba(22, 18, 16, 0.98), rgba(28, 22, 19, 0.96));
        color: var(--panel);
        backdrop-filter: blur(10px);
        box-shadow: 0 10px 26px rgba(18, 13, 11, 0.12);
      }

      .docs-eyebrow {
        margin: 0 0 6px;
        color: var(--warm);
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.04em;
        text-transform: uppercase;
      }

      .docs-header h1 {
        margin: 0;
        font-size: 1.05rem;
        font-weight: 750;
        line-height: 1.2;
        color: var(--panel);
      }

      .docs-copy {
        margin: 6px 0 0;
        color: rgba(244, 234, 223, 0.74);
        font-size: 0.88rem;
      }

      .docs-meta {
        color: rgba(244, 234, 223, 0.68);
        font-size: 0.82rem;
        font-family: "JetBrains Mono", "Cascadia Code", "SF Mono", ui-monospace, monospace;
        white-space: nowrap;
      }

      redoc {
        display: block;
        flex: 1 1 auto;
        min-height: 0;
      }

      @media (max-width: 760px) {
        .docs-header {
          align-items: flex-start;
          flex-direction: column;
          padding: 16px 16px 14px;
        }

        .docs-meta {
          white-space: normal;
        }
      }
    </style>
  </head>
  <body>
    <div class="docs-shell">
      <header class="docs-header">
        <div>
          <p class="docs-eyebrow">Darkcloth developer documentation</p>
          <h1>Darkcloth Film API Reference</h1>
          <p class="docs-copy">Published OpenAPI reference for Darkcloth film resources and workflows.</p>
        </div>
        <div class="docs-meta">/api/openapi.yaml</div>
      </header>
      <redoc spec-url="/api/openapi.yaml"></redoc>
    </div>
    <script src="https://cdn.redoc.ly/redoc/latest/bundles/redoc.standalone.js"></script>
  </body>
</html>
