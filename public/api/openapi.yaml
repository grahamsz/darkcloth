  # ── Film Resources: Rolls ─────────────────────────────────────────────────────

  /api/film/rolls:
    get:
      operationId: listRolls
      summary: List rolls
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: film_id
          in: query
          schema:
            type: string
        - name: roll_format
          in: query
          schema:
            type: string
            enum:
              - 35mm
              - 120
              - 220
              - 127
              - 620
          description: Filter rolls by media format.
      responses:
        "200":
          description: Roll list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Roll"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createRoll
      summary: Start a roll
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                film_id:
                  type:
                    - string
                    - "null"
                roll_format:
                  type:
                    - string
                    - "null"
                  enum:
                    - 35mm
                    - 120
                    - 220
                    - 127
                    - 620
                    - null
                  description: Roll media format. Null means the roll is
                    format-agnostic.
                loaded_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                finished_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                processed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                developed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                  deprecated: true
                  description: Compatibility alias for `processed_at`.
                development_profile_id:
                  type:
                    - string
                    - "null"
                  description: Development profile used when the roll is processed.
                development_notes:
                  type:
                    - string
                    - "null"
                  description: Free-form notes recorded when the roll is processed.
                push_pull_stops:
                  type: integer
                  enum: [-3, -2, -1, 0, 1, 2, 3]
                  default: 0
      responses:
        "201":
          description: Roll created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/film/rolls/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getRoll
      summary: Get a roll
      responses:
        "200":
          description: Roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateRoll
      summary: Update a roll
      description: >
        Update roll metadata or lifecycle timestamps. `developed_at` remains a
        compatibility alias for `processed_at`. When lifecycle timestamps are
        changed, the roll status is updated to the matching current lifecycle
        state.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                film_id:
                  type:
                    - string
                    - "null"
                roll_format:
                  type:
                    - string
                    - "null"
                  enum:
                    - 35mm
                    - 120
                    - 220
                    - 127
                    - 620
                    - null
                  description: Roll media format. Null clears the stored
                    format.
                loaded_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                finished_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                processed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                developed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                  deprecated: true
                  description: Compatibility alias for `processed_at`.
                development_profile_id:
                  type:
                    - string
                    - "null"
                  description: Development profile used when the roll is processed. The profile must belong to the current user and match the roll's film stock when the roll has a film stock.
                development_notes:
                  type:
                    - string
                    - "null"
                  description: Free-form notes recorded when the roll is processed.
                push_pull_stops:
                  type: integer
                  enum: [-3, -2, -1, 0, 1, 2, 3]
      responses:
        "200":
          description: Updated roll
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteRoll
      summary: Delete a roll
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/rolls/{id}/finish:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: finishRoll
      summary: Mark a roll finished
      description: Marks the roll ready for processing. The timestamp defaults to now when omitted.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                finished_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                  description: Optional timestamp override when marking the roll finished.
      responses:
        "200":
          description: Roll marked finished
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/rolls/{id}/process:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: processRoll
      summary: Mark a roll processed
      description: Marks the roll processed/developed. The processed timestamp defaults to now when omitted.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                processed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                  description: Optional processing timestamp override.
                developed_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                  deprecated: true
                  description: Compatibility alias for `processed_at`.
                development_profile_id:
                  type:
                    - string
                    - "null"
                  description: Optional development profile to attach when processing the roll. The profile must belong to the current user and match the roll's film stock when the roll has a film stock.
                development_notes:
                  type:
                    - string
                    - "null"
                  description: Optional notes recorded when the roll is processed.
      responses:
        "200":
          description: Roll processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/rolls/{id}/reopen:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: reopenRoll
      summary: Reopen a roll
      description: Reopens a finished or processed roll without erasing processing history fields.
      responses:
        "200":
          description: Roll reopened
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Roll"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Photographs ───────────────────────────────────────────────────────────────

  /api/photographs:
    get:
      operationId: listPhotographs
      summary: List photographs
      description: >
        Returns hydrated photograph records with batch-loaded images and filters.
        When `roll_id` is provided, the results are ordered by frame number when
        available, then `taken_at`, then `created_at` so roll-detail consumers
        can render a roll timeline without per-photo fetches.
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
        - name: roll_id
          in: query
          schema:
            type: string
          description: Roll-specific filter. When present, the result ordering
            favors frame number, then capture time, then creation time.
        - name: camera_id
          in: query
          schema:
            type: string
        - name: lens_id
          in: query
          schema:
            type: string
        - name: film_id
          in: query
          schema:
            type: string
        - name: film_holder_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Photograph list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Photograph"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createPhotograph
      summary: Log a photograph
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                roll_id:
                  type: string
                  description: >
                    Required for roll-camera shots. Must reference a roll
                    belonging to the current user. When a camera is selected,
                    the roll must be compatible with that camera's roll format.
                    The roll's film stock is inferred for film_id. Not
                    accepted for sheet cameras.
                camera_id:
                  type: string
                  description: >
                    If the selected camera has explicit lens compatibility rows, lens_id must
                    be one of those acceptable lens IDs.
                lens_id:
                  type: string
                filter_ids:
                  type: array
                  description: >
                    Ordered filter IDs applied to the photograph, from first to last.
                    Non-empty arrays require lens_id, and each filter must belong to the
                    current user.
                  items:
                    type: string
                film_holder_id:
                  type:
                    - string
                    - "null"
                  description: >
                    Optional for sheet-camera shots. When omitted, null, or
                    blank, no holder is stored. If provided, it must reference
                    a film holder belonging to the current user with an active
                    load and, when a camera is selected, the holder must be
                    applicable to that camera. The holder's active load film
                    stock is applied to the photo, and the load is marked
                    exposed on first use.
                    Non-null values are rejected for roll cameras.
                confirm_reexposure:
                  type: boolean
                  description: When true and the holder currently has an exposed load, discard that load and expose a fresh one using the same film stock.
                film_id:
                  type:
                    - string
                    - "null"
                  description: When roll_id or film_holder_id is provided,
                    this must be omitted or match the derived film stock.
                    Otherwise it may be set directly for legacy or
                    camera-agnostic writes.
                frame_number:
                  type: string
                  description: Required for roll-camera shots. Must reference a roll belonging to the current user. Not accepted for sheet cameras.
                taken_at:
                  type: string
                  format: date-time
                aperture:
                  type: string
                  description: Default f-stop when omitted or empty
                  default: f/5.6
                  example: f/5.6
                shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: Calculation-friendly shutter speed in seconds.
                shutter_mode:
                  type: string
                  enum:
                    - fixed
                    - bulb
                  description: Structured exposure mode. Bulb rows require a
                    positive bulb_duration_seconds value.
                bulb_duration_seconds:
                  type:
                    - number
                    - "null"
                  description: Measured bulb duration in seconds. Required
                    when shutter_mode is bulb.
                exposure_entry_mode:
                  $ref: "#/components/schemas/ExposureEntryMode"
                exposure_details:
                  oneOf:
                    - $ref: "#/components/schemas/PhotographExposureDetails"
                    - $ref: "#/components/schemas/ManualPhotographExposureDetails"
                    - type: "null"
                  description: >
                    Structured historical calculation details. Manual entries
                    may omit this field, send null, or send an empty object.
                shutter_speed:
                  type:
                    - string
                    - "null"
                  description: Compatibility/display string only.
                focal_length_mm:
                  type: number
                latitude:
                  type: number
                longitude:
                  type: number
                altitude_m:
                  type: number
                gps_accuracy_m:
                  type: number
                notes:
                  type: string
                title:
                  type:
                    - string
                    - "null"
                  description: Optional display title. Blank strings are normalized to null.
      responses:
        "201":
          description: Photograph logged
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photograph"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/photographs/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getPhotograph
      summary: Get a photograph
      responses:
        "200":
          description: Photograph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photograph"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updatePhotograph
      summary: Update a photograph
      requestBody:
