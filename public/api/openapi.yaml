                frame_number:
                  type:
                    - string
                    - "null"
                  description: Required for roll-camera shots. Must reference a roll belonging to the current user. Not accepted for sheet cameras.
                taken_at:
                  type:
                    - string
                    - "null"
                  format: date-time
                aperture:
                  type:
                    - string
                    - "null"
                shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: Calculation-friendly shutter speed in seconds.
                shutter_mode:
                  type: string
                  enum:
                    - fixed
                    - bulb
                  description: Structured exposure mode. Bulb rows require a
                    positive bulb_duration_seconds value.
                bulb_duration_seconds:
                  type:
                    - number
                    - "null"
                  description: Measured bulb duration in seconds. Required
                    when shutter_mode is bulb; null clears the bulb duration
                    when switching to fixed.
                exposure_entry_mode:
                  $ref: "#/components/schemas/ExposureEntryMode"
                exposure_details:
                  oneOf:
                    - $ref: "#/components/schemas/PhotographExposureDetails"
                    - $ref: "#/components/schemas/ManualPhotographExposureDetails"
                    - type: "null"
                  description: >
                    Structured historical calculation details. Manual entries
                    may omit this field, send null, or send an empty object.
                shutter_speed:
                  type:
                    - string
                    - "null"
                  description: Compatibility/display string only.
                focal_length_mm:
                  type:
                    - number
                    - "null"
                latitude:
                  type:
                    - number
                    - "null"
                longitude:
                  type:
                    - number
                    - "null"
                altitude_m:
                  type:
                    - number
                    - "null"
                gps_accuracy_m:
                  type:
                    - number
                    - "null"
                notes:
                  type:
                    - string
                    - "null"
                title:
                  type:
                    - string
                    - "null"
                  description: Optional display title. Blank strings are normalized to null.
      responses:
        "200":
          description: Updated photograph
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Photograph"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deletePhotograph
      summary: Delete a photograph
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Photograph Images ─────────────────────────────────────────────────────────

  /api/photographs/{id}/images:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: listPhotographImages
      summary: List images for a photograph
      responses:
        "200":
          description: Image list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/PhotographImage"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: uploadPhotographImage
      summary: Upload a reference image for a photograph
      description: |
        Upload a reference scan or contact print. Multipart form upload.
        Provide `original` as the preferred source file. Legacy `display` or
        `file` uploads remain accepted as source aliases. The Worker generates
        display and thumbnail variants server-side and stores the source upload
        as the original when present. Browser-resized width/height metadata is
        ignored.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                original:
                  type: string
                  format: binary
                  description: Preferred source upload. The Worker stores this as the original object and derives display/thumbnail variants from it.
                display:
                  type: string
                  format: binary
                  description: Legacy alias for `original`, kept for backwards compatibility.
                file:
                  type: string
                  format: binary
                  description: Legacy alias for `original`, kept for backwards compatibility.
                thumbnail:
                  type: string
                  format: binary
                  description: Legacy browser-resized thumbnail upload. Accepted for compatibility, but the Worker generates its own stored thumbnail.
      responses:
        "201":
          description: Image uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhotographImage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/photographs/{id}/images/{image_id}/file:
    parameters:
      - $ref: "#/components/parameters/id"
      - name: image_id
        in: path
        required: true
        schema:
          type: string
      - name: variant
        in: query
        required: false
        schema:
          type: string
          enum:
            - display
            - thumbnail
            - original
        description: Optional image variant to stream. Omit for the display image.
      - name: expires
        in: query
        required: true
        schema:
          type: integer
      - name: signature
        in: query
        required: true
        schema:
          type: string
    get:
      operationId: downloadPhotographImage
      summary: Download an image
      description: Signed URL target returned in `PhotographImage.url`, `thumbnail_url`, or `original_url`.
      security: []
      responses:
        "200":
          description: Image bytes
          content:
            image/*:
              schema:
                type: string
                format: binary
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"

  /api/photographs/{id}/images/{image_id}:
    parameters:
      - $ref: "#/components/parameters/id"
      - name: image_id
        in: path
        required: true
        schema:
          type: string
    delete:
      operationId: deletePhotographImage
      summary: Delete an image
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"
        "503":
          $ref: "#/components/responses/ServiceUnavailable"
