  # ── Gear: Cameras ─────────────────────────────────────────────────────────────

  /api/gear/cameras:
    get:
      operationId: listCameras
      summary: List cameras
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Camera list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Camera"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createCamera
      summary: Add a camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              description: >
                Camera identity and capture-capability fields. Compatibility
                writes are legacy-only; use Lens.applicable_camera_ids to edit
                camera/lens compatibility.
              properties:
                name:
                  type: string
                maker:
                  type: string
                film_type:
                  type:
                    - string
                    - "null"
                  enum:
                    - sheet
                    - roll
                    - null
                roll_format:
                  type:
                    - string
                    - "null"
                  enum:
                    - 35mm
                    - 120
                    - 220
                    - 127
                    - 620
                    - null
                  description: Roll media format restriction. Null means any
                    roll format is accepted.
                has_shutter:
                  type: boolean
                  description: Explicit shutter capability flag. When false,
                    shutter range fields are normalized to null and
                    supports_bulb is false.
                min_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Minimum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 0.00025
                max_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Maximum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 1
                supports_bulb:
                  type: boolean
                  description: Bulb support. Normalized to false when
                    has_shutter is false.
      responses:
        "201":
          description: Camera created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/gear/cameras/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getCamera
      summary: Get a camera
      responses:
        "200":
          description: Camera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateCamera
      summary: Update a camera
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Camera identity and capture-capability fields. Compatibility
                writes are legacy-only; use Lens.applicable_camera_ids to edit
                camera/lens compatibility.
              properties:
                name:
                  type: string
                maker:
                  type: string
                film_type:
                  type:
                    - string
                    - "null"
                  enum:
                    - sheet
                    - roll
                    - null
                roll_format:
                  type:
                    - string
                    - "null"
                  enum:
                    - 35mm
                    - 120
                    - 220
                    - 127
                    - 620
                    - null
                  description: Roll media format restriction. Null clears the
                    restriction.
                has_shutter:
                  type: boolean
                  description: Explicit shutter capability flag. When false,
                    shutter range fields are normalized to null and
                    supports_bulb is false.
                min_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Minimum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 0.00025
                max_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Maximum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 1
                supports_bulb:
                  type: boolean
                  description: Bulb support. Normalized to false when
                    has_shutter is false.
      responses:
        "200":
          description: Updated camera
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Camera"
        "404":
          $ref: "#/components/responses/NotFound"
