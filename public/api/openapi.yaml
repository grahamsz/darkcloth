openapi: 3.1.0
info:
  title: Phototracker API
  version: 0.1.0
  license:
    name: Proprietary
  description: |
    API for tracking film photographs — cameras, lenses, film stocks, development profiles, film holders, rolls, exposures, and reference images.
servers:
  - url: https://darkcloth.zone
    description: Primary production hostname.
  - url: https://phototracker.graha.ms
    description: Legacy/staging hostname during the transition.

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    User:
      type: object
      required: [id, email, default_timezone, auto_use_current_location, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        email:
          type: string
          format: email
          example: "user@example.com"
        default_timezone:
          type:
            - string
            - "null"
          description: Stored IANA timezone preference. Null when unset.
          example: "America/Denver"
        auto_use_current_location:
          type: boolean
          description: Whether new photo logs should request browser geolocation automatically.
          example: false
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    Camera:
      type: object
      required: [id, user_id, name, created_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type: string
          example: "Leica M6"
        maker:
          type:
            - string
            - "null"
          example: "Leica"
        film_type:
          type:
            - string
            - "null"
          enum:
            - sheet
            - roll
            - null
          description: >
            Controls photograph transport defaults. Sheet cameras use film
            holders. Roll cameras require a roll and frame number.
        roll_format:
          type:
            - string
            - "null"
          enum:
            - 35mm
            - 120
            - 220
            - 127
            - 620
            - null
          description: >
            Optional roll format restriction for roll cameras. Null means any
            roll format is accepted.
        has_shutter:
          type: boolean
          description: Explicit shutter capability flag. When false, shutter
            range fields are normalized to null and supports_bulb is false.
        min_shutter_speed_seconds:
          type:
            - number
            - "null"
          description: >
            Minimum supported shutter speed in seconds. Valid only when
            has_shutter is true.
          example: 0.00025
        max_shutter_speed_seconds:
          type:
            - number
            - "null"
          description: >
            Maximum supported shutter speed in seconds. Valid only when
            has_shutter is true.
          example: 1
        supports_bulb:
          type: boolean
          description: >
            Bulb support. Normalized to false when has_shutter is false.
        acceptable_lens_ids:
          type: array
          readOnly: true
          description: >
            Read-only compatibility summary derived from camera_lenses. Camera
            pages may still show this for legacy compatibility, but
            compatibility writes now belong on Lens.applicable_camera_ids.
          items:
            type: string
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    Lens:
      type: object
      required: [id, user_id, name, created_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type: string
          example: "Summicron-M 35mm f/2 ASPH"
        focal_length_mm:
          type:
            - number
            - "null"
          description: >
            Legacy single focal-length field retained for compatibility.
            For write requests where min/max fields are absent, this value is
            mapped to min_focal_length_mm and max_focal_length_mm.
          example: 35
        min_focal_length_mm:
          type:
            - number
            - "null"
          description: Minimum supported focal length (mm)
          example: 24
        max_focal_length_mm:
          type:
            - number
            - "null"
          description: Maximum supported focal length (mm)
          example: 100
        max_aperture:
          type:
            - string
            - "null"
          description: e.g. "f/1.4"
          example: "f/2"
        has_shutter:
          type: boolean
          description: Explicit shutter capability flag. When false, shutter
            range fields are normalized to null and supports_bulb is false.
        min_shutter_speed_seconds:
          type:
            - number
            - "null"
          description: >
            Minimum supported shutter speed in seconds. Valid only when
            has_shutter is true.
          example: 0.00025
        max_shutter_speed_seconds:
          type:
            - number
            - "null"
          description: >
            Maximum supported shutter speed in seconds. Valid only when
            has_shutter is true.
          example: 1
        supports_bulb:
          type: boolean
          description: Bulb support. Normalized to false when has_shutter is
            false.
        min_f_stop:
          type:
            - number
            - "null"
          description: Minimum supported f-stop for this lens
          default: 5.6
          example: 5.6
        max_f_stop:
          type:
            - number
            - "null"
          description: Maximum supported f-stop for this lens
          default: 32
          example: 32
        aperture_increment:
          type:
            - string
            - "null"
          description: Step between valid aperture options
          enum:
            - full
            - half
            - third
          example: full
        flare_factor:
          type: number
          description: Lens flare factor used by BTZS exposure calculations.
          default: 0.02
          minimum: 0
          example: 0.02
        applicable_camera_ids:
          type: array
          description: >
            Authoritative camera IDs this lens is applicable to. An empty array
            means all cameras. Use this field to edit camera/lens
            compatibility.
          items:
            type: string
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    Filter:
      type: object
      required: [id, user_id, name, filter_factor, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type: string
          example: "Red"
        code:
          type:
            - string
            - "null"
          example: "Wratten 25"
        filter_factor:
          type: number
          description: >
            Exposure-adjusting factor for the filter, represented as a positive
            number.
          minimum: 0
          exclusiveMinimum: true
          example: 8
        source:
          type:
            - string
            - "null"
          description: Optional provenance of the factor source string.
          example: "Filter factor from the common filter factors table (approximate, film-response dependent, and daylight-based)."
        standard_key:
          type:
            - string
            - "null"
          description: Stable key of a preset entry this filter was created from.
          example: "wratten_25"
        notes:
          type:
            - string
            - "null"
          description: Optional free-form filter notes.
        applicable_lens_ids:
          type: array
          description: Lens IDs this filter applies to. An empty array means all lenses.
          items:
            type: string
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    FilterPreset:
      type: object
      required: [key, name, filter_factor]
      properties:
        key:
          type: string
          example: "wratten_25"
        name:
          type: string
          example: "Red"
        code:
          type: string
          example: "Wratten 25"
        filter_factor:
          type: number
          minimum: 0
          exclusiveMinimum: true
          example: 8
        category:
          type: string
        notes:
          type:
            - string
            - "null"

    FilmStock:
      type: object
      required: [id, user_id, name, stock_type, reciprocity_p_factor, created_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type: string
          example: "Kodak Portra 400"
        iso:
          type:
            - integer
            - "null"
          example: 400
        stock_type:
          $ref: "#/components/schemas/FilmStockType"
        reciprocity_p_factor:
          type: number
          description: Exposure reciprocity P factor. Defaults to 1 for newly created film stocks and legacy rows that predate the migration.
          minimum: 0
          exclusiveMinimum: true
          default: 1
          example: 1
        process:
          type:
            - string
            - "null"
          description: e.g. "C-41", "E-6", "B&W"
          example: "C-41"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    FilmStockType:
      type: string
      enum:
        - color_negative
        - bw
        - color_slide
        - bw_slide
        - color_infrared
        - bw_infrared
        - other
      description: >
        Film stock category. The `bw` storage value represents B&W Negative;
        BTZS development profiles are only allowed for B&W Negative film stocks.

    BTZSChartData:
      type: object
      description: >
        Structured BTZS chart payloads. The API preserves arbitrary chart
        metadata so labels, axis titles, point series, and effective-film-speed
        annotations can round-trip without numeric parsing. Imported XDF film
        profiles usually surface two chart families: Average G / development-time
        and Average G / EFS.
      properties:
        title:
          type: string
        xAxisLabel:
          type: string
        yAxisLabel:
          type: string
        effectiveFilmSpeed:
          type:
            - number
            - "null"
          description: Numeric effective film speed when available.
        effectiveFilmSpeedLabel:
          type:
            - string
            - "null"
          description: Text label such as `40++` or `100-`. Preserved even when effectiveFilmSpeed is absent.
        points:
          type: array
          items:
            $ref: "#/components/schemas/BTZSChartPoint"
      additionalProperties: true

    BTZSChartPoint:
      type: object
      description: >
        A single BTZS chart point. Imported XDF profiles commonly use Average G
        as the x-axis and either development time or effective film speed on
        the y-axis, but the API keeps arbitrary point keys intact.
      properties:
        averageG:
          type:
            - number
            - string
          description: Average G / Average Gradient value.
        developmentTime:
          type:
            - number
            - string
          description: Development time value from an Average G / development-time chart.
        effectiveFilmSpeed:
          type:
            - number
            - string
          description: Effective film speed value from an Average G / EFS chart.
        effectiveFilmSpeedLabel:
          type:
            - string
            - "null"
          description: Text label such as `40++` or `100-`.
        sbr:
          type:
            - number
            - string
          description: Subject brightness range value used by other BTZS chart variants.
      additionalProperties: true

    BTZSSourceFile:
      type: object
      description: >
        Structured source-file metadata for BTZS profiles. The API preserves
        arbitrary JSON objects so client-side forms can round-trip file
        references and notes without losing detail.
      additionalProperties: true

    RawXdfMetadata:
      type: object
      description: >
        Metadata imported from BTZS / ExpoDev XDF profiles. The Worker stores
        the export's display name, scaled Paper ES value, and explicit
        reciprocity fields alongside the raw object so BTZS development
        profiles can round-trip imported metadata without parsing the file
        format in the API layer.
      required:
        - versionOrType
        - displayName
        - processLabel
        - paperES
        - reciprocityExpIndex
        - reciprocityGIndex
        - useReciprocity
      properties:
        versionOrType:
          type:
            - string
            - number
          description: XDF version or type label.
        displayName:
          type: string
          description: Display name chosen during export.
        processLabel:
          type: string
          description: Process or developer label from the export.
        paperES:
          type: number
          exclusiveMinimum: 0
          description: Scaled decimal Paper ES value preserved from the export.
        reciprocityExpIndex:
          type: integer
          minimum: 0
          maximum: 4
          description: Reciprocity exposure index preserved from the export.
        reciprocityGIndex:
          type: integer
          minimum: 0
          maximum: 6
          description: Reciprocity G index preserved from the export.
        useReciprocity:
          type: integer
          enum: [0, 1]
          description: Reciprocity flag preserved from the export.
      additionalProperties: true
      examples:
        - versionOrType: "XDF-1"
          displayName: "Ilford FP4+ / DD-X"
          processLabel: "DD-X"
          paperES: 1.25
          reciprocityExpIndex: 0
          reciprocityGIndex: 0
          useReciprocity: 1

    DevelopmentProfileBase:
      type: object
      required:
        - id
        - userId
        - filmStockId
        - type
        - name
        - developerName
        - dilution
        - temperatureText
        - agitation
        - notes
        - createdAt
        - updatedAt
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        userId:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        filmStockId:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        type:
          type: string
          enum:
            - simple
            - btzs
        name:
          type: string
          example: "FP4+ / DDX"
        developerName:
          type: string
          example: "Ilford DD-X"
        dilution:
          type:
            - string
            - "null"
          example: "1+4"
        temperatureText:
          type: string
          example: "20C"
        agitation:
          type:
            - string
            - "null"
          example: "5 sec every 30 sec"
        notes:
          type:
            - string
            - "null"
          example: "Fixture profile used for chart rendering."
        createdAt:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        updatedAt:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    SimpleDevelopmentProfile:
      allOf:
        - $ref: "#/components/schemas/DevelopmentProfileBase"
        - type: object
          required: [timeText]
          properties:
            type:
              type: string
              enum:
                - simple
            timeText:
              type: string
              example: "7:30"

    BTZSDevelopmentProfile:
      allOf:
        - $ref: "#/components/schemas/DevelopmentProfileBase"
        - type: object
          required:
            - filmIso
            - testDate
            - curvesText
            - flareDensityText
            - paperEsText
            - methodText
            - keyValuesText
            - rawXdf
            - chartData
            - sourceFiles
          properties:
            type:
              type: string
              enum:
                - btzs
            filmIso:
              type:
                - string
                - "null"
              example: "400"
            testDate:
              type:
                - string
                - "null"
              format: date
              example: "2026-04-29"
            curvesText:
              type:
                - string
                - "null"
              example: "Straight-line section only."
            flareDensityText:
              type:
                - string
                - "null"
              example: "0.15"
            paperEsText:
              type:
                - string
                - "null"
              example: "Grade 2"
            methodText:
              type:
                - string
                - "null"
              example: "BTZS Plotter"
            keyValuesText:
              type:
                - string
                - "null"
              example: "CI 0.56 / EFS 100-"
            rawXdf:
              oneOf:
                - $ref: "#/components/schemas/RawXdfMetadata"
                - type: "null"
            chartData:
              type:
                - array
                - "null"
              items:
                $ref: "#/components/schemas/BTZSChartData"
            sourceFiles:
              type:
                - array
                - "null"
              items:
                $ref: "#/components/schemas/BTZSSourceFile"

    DevelopmentProfile:
      oneOf:
        - $ref: "#/components/schemas/SimpleDevelopmentProfile"
        - $ref: "#/components/schemas/BTZSDevelopmentProfile"
      discriminator:
        propertyName: type
        mapping:
          simple: "#/components/schemas/SimpleDevelopmentProfile"
          btzs: "#/components/schemas/BTZSDevelopmentProfile"

    DevelopmentProfileSummary:
      type: object
      required: [id, name]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type:
            - string
            - "null"
          description: Nullable profile display name for historical compatibility.
          example: "D-76 1+1"

    FilmHolderLoadDevelopmentSummary:
      type: object
      required: [label, source, minutes, time_text]
      properties:
        label:
          type: string
          description: Display label for the development time summary.
          example: "Development time"
        source:
          type: string
          enum:
            - stored-btzs-calculation
            - development-profile-time
          description: Where the summary value came from.
        minutes:
          type:
            - number
            - "null"
          description: Development time in minutes, when the value came from a stored BTZS calculation.
          example: 9.5
        time_text:
          type:
            - string
            - "null"
          description: Human-readable development time display text.
          example: "9:30"

    SimpleDevelopmentProfileCreate:
      type: object
      required: [type, name, developerName, temperatureText, timeText]
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - simple
        name:
          type: string
        developerName:
          type: string
        dilution:
          type:
            - string
            - "null"
        temperatureText:
          type: string
        agitation:
          type:
            - string
            - "null"
        notes:
          type:
            - string
            - "null"
        timeText:
          type: string

    BTZSDevelopmentProfileCreate:
      type: object
      required: [type, name, developerName, temperatureText]
      additionalProperties: false
      properties:
        type:
          type: string
          enum:
            - btzs
        name:
          type: string
        developerName:
          type: string
        dilution:
          type:
            - string
            - "null"
        temperatureText:
          type: string
        agitation:
          type:
            - string
            - "null"
        notes:
          type:
            - string
            - "null"
        filmIso:
          type:
            - string
            - "null"
        testDate:
          type:
            - string
            - "null"
          format: date
        curvesText:
          type:
            - string
            - "null"
        flareDensityText:
          type:
            - string
            - "null"
        paperEsText:
          type:
            - string
            - "null"
        methodText:
          type:
            - string
            - "null"
        keyValuesText:
          type:
            - string
            - "null"
        rawXdf:
          description: BTZS-only imported XDF metadata. Simple profile creates reject this field.
          oneOf:
            - $ref: "#/components/schemas/RawXdfMetadata"
            - type: "null"
        chartData:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/BTZSChartData"
        sourceFiles:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/BTZSSourceFile"

    DevelopmentProfileCreate:
      oneOf:
        - $ref: "#/components/schemas/SimpleDevelopmentProfileCreate"
        - $ref: "#/components/schemas/BTZSDevelopmentProfileCreate"

    DevelopmentProfileUpdate:
      type: object
      additionalProperties: false
      properties:
        name:
          type: string
        developerName:
          type: string
        dilution:
          type:
            - string
            - "null"
        temperatureText:
          type:
            - string
            - "null"
        agitation:
          type:
            - string
            - "null"
        notes:
          type:
            - string
            - "null"
        timeText:
          type:
            - string
            - "null"
          description: Simple-profile development time text. Not valid for BTZS profiles.
        filmIso:
          type:
            - string
            - "null"
        testDate:
          type:
            - string
            - "null"
          format: date
        curvesText:
          type:
            - string
            - "null"
        flareDensityText:
          type:
            - string
            - "null"
        paperEsText:
          type:
            - string
            - "null"
        methodText:
          type:
            - string
            - "null"
        keyValuesText:
          type:
            - string
            - "null"
        chartData:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/BTZSChartData"
        sourceFiles:
          type:
            - array
            - "null"
          items:
            $ref: "#/components/schemas/BTZSSourceFile"
        rawXdf:
          description: BTZS-only imported XDF metadata. Simple profile updates reject this field.
          oneOf:
            - $ref: "#/components/schemas/RawXdfMetadata"
            - type: "null"

    DevelopmentProfileList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/DevelopmentProfile"
        total:
          type: integer

    Roll:
      type: object
      required: [id, user_id, name, status, push_pull_stops, created_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        film_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        roll_format:
          type:
            - string
            - "null"
          enum:
            - 35mm
            - 120
            - 220
            - 127
            - 620
            - null
          description: Roll media format. Null means the roll is format-agnostic.
        name:
          type: string
          example: "Portra 400 #1"
        loaded_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-29T20:26:05Z"
        finished_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the roll was marked ready for processing.
          example: null
        status:
          $ref: "#/components/schemas/RollStatus"
        push_pull_stops:
          type: integer
          description: Push/pull adjustment in stops. Valid values range from -3 to 3.
          enum: [-3, -2, -1, 0, 1, 2, 3]
          example: 0
        processed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Canonical processing completion timestamp. `developed_at` remains a compatibility alias.
          example: null
        developed_at:
          type:
            - string
            - "null"
          format: date-time
          deprecated: true
          description: Compatibility alias for `processed_at` returned for older callers.
          example: null
        development_profile_id:
          type:
            - string
            - "null"
          description: Development profile used when the roll was processed.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        development_notes:
          type:
            - string
            - "null"
          description: Free-form notes recorded when the roll was processed.
          example: "Processed in DDX"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    RollStatus:
      type: string
      enum:
        - unexposed
        - exposing
        - finished
        - processed
        - developed
      description: Canonical roll lifecycle status. `processed` is the canonical final state; `developed` remains a compatibility alias.

    FilmHolderLoadStatus:
      type: string
      enum:
        - loaded
        - exposed
        - processed
        - discarded
      description: Canonical film-holder load lifecycle status.

    FilmHolderLoadReferenceImageSummary:
      type: object
      required:
        - id
        - content_type
        - width
        - height
        - thumbnail_content_type
        - thumbnail_width
        - thumbnail_height
        - thumbnail_url
        - url
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        content_type:
          type: string
          description: MIME type for the stored display image.
          example: "image/jpeg"
        width:
          type:
            - integer
            - "null"
          example: 3000
        height:
          type:
            - integer
            - "null"
          example: 2000
        thumbnail_content_type:
          type:
            - string
            - "null"
          description: MIME type for the server-generated thumbnail variant.
          example: "image/jpeg"
        thumbnail_width:
          type:
            - integer
            - "null"
          example: 256
        thumbnail_height:
          type:
            - integer
            - "null"
          example: 171
        thumbnail_url:
          type:
            - string
            - "null"
          description: Signed download URL for the thumbnail variant, when stored.
          example: "https://darkcloth.zone/api/photographs/01ARZ3NDEKTSV4RRFFQ69G5FAV/images/01BX5ZZKBKACTAV9WEVGEMMVS0/file?variant=thumbnail&expires=1777540800&signature=abc123"
        url:
          type:
            - string
            - "null"
          description: Signed download URL for the display variant, when stored.
          example: "https://darkcloth.zone/api/photographs/01ARZ3NDEKTSV4RRFFQ69G5FAV/images/01BX5ZZKBKACTAV9WEVGEMMVS0/file?expires=1777540800&signature=abc123"

    FilmHolderLoadPhotographSummary:
      type: object
      required:
        - id
        - frame_number
        - taken_at
        - camera_id
        - camera_name
        - lens_id
        - lens_name
        - reference_image
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        frame_number:
          type:
            - string
            - "null"
          example: "12"
        taken_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-29T20:26:05Z"
        camera_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        camera_name:
          type:
            - string
            - "null"
          example: "Mamiya 645"
        lens_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        lens_name:
          type:
            - string
            - "null"
          example: "80mm f/2.8"
        reference_image:
          oneOf:
            - $ref: "#/components/schemas/FilmHolderLoadReferenceImageSummary"
            - type: "null"

    PhotographLifecycleSummary:
      type: object
      required:
        - loaded_at
        - exposed_at
        - processed_at
        - developed_at
        - development_profile_name
      properties:
        loaded_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the relevant roll or film-holder load was loaded.
          example: "2026-04-29T20:26:05Z"
        exposed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the photograph was exposed, or the best available lifecycle source for roll-backed rows.
          example: "2026-04-29T20:26:05Z"
        processed_at:
          type:
            - string
            - "null"
          format: date-time
          description: Canonical processing completion timestamp.
          example: null
        developed_at:
          type:
            - string
            - "null"
          format: date-time
          deprecated: true
          description: Compatibility alias for `processed_at`.
          example: null
        development_profile_name:
          type:
            - string
            - "null"
          description: Nullable display name for the associated development profile, when one exists.
          example: "D-76 1+1"

    FilmHolderLoad:
      type: object
      required:
        - id
        - user_id
        - film_holder_id
        - film_id
        - status
        - loaded_at
        - exposed_at
        - exposed_photograph_id
        - processed_at
        - development_profile_id
        - development_profile
        - development_summary
        - exposed_photograph
        - notes
        - created_at
        - updated_at
        - film
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        film_holder_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        film_id:
          type:
            - string
            - "null"
          description: Film stock loaded into the holder. Null only appears for stale historical rows.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        status:
          $ref: "#/components/schemas/FilmHolderLoadStatus"
        loaded_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        exposed_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-29T20:26:05Z"
        exposed_photograph_id:
          type:
            - string
            - "null"
          description: Photograph that first exposed the load.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        processed_at:
          type:
            - string
            - "null"
          format: date-time
          example: null
        discarded_at:
          type:
            - string
            - "null"
          format: date-time
          description: Timestamp when the load was discarded, if it was discarded.
          example: null
        discarded_reason:
          type:
            - string
            - "null"
          description: Reason recorded when the load was discarded.
          example: null
        development_profile_id:
          type:
            - string
            - "null"
          description: Development profile used when the load was processed.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        development_profile:
          oneOf:
            - $ref: "#/components/schemas/DevelopmentProfileSummary"
            - type: "null"
          description: Nullable summary for the associated development profile, including the profile name when available.
        development_summary:
          oneOf:
            - $ref: "#/components/schemas/FilmHolderLoadDevelopmentSummary"
            - type: "null"
          description: Compact display summary for the load's development time, preferring stored BTZS minutes when available.
        exposed_photograph:
          oneOf:
            - $ref: "#/components/schemas/FilmHolderLoadPhotographSummary"
            - type: "null"
          description: Nullable summary for the photograph that first exposed the load, including one reference image when available.
        notes:
          type:
            - string
            - "null"
          description: Optional free-form load notes.
        film:
          oneOf:
            - $ref: "#/components/schemas/FilmStock"
            - type: "null"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    FilmHolder:
      type: object
      required: [id, user_id, name, type, created_at, current_load]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        name:
          type: string
          example: "Box of 4x5 Sheets"
        type:
          type: string
          description: >
            e.g. "127", "220", "4x5", "8x10"
          example: "4x5"
        width_mm:
          type:
            - number
            - "null"
          description: Optional width in millimeters
          example: 152
        height_mm:
          type:
            - number
            - "null"
          description: Optional height in millimeters
          example: 203
        brand:
          type:
            - string
            - "null"
          description: Optional holder brand
          example: "Ilford"
        capacity:
          type:
            - integer
            - "null"
          description: Number of sheets per pack, if applicable
          example: 50
        applicable_camera_ids:
          type: array
          description: Camera IDs this holder applies to. An empty array means all cameras.
          items:
            type: string
        current_load:
          oneOf:
            - $ref: "#/components/schemas/FilmHolderLoad"
            - type: "null"
          description: The holder's active load, if any. Discarded and processed loads remain in load_history only.
        load_history:
          type: array
          description: Chronological holder load history, newest first.
          items:
            $ref: "#/components/schemas/FilmHolderLoad"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

    Photograph:
      type: object
      required: [id, user_id, created_at, updated_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        user_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        roll_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        camera_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        lens_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        film_holder_id:
          type:
            - string
            - "null"
          description: >
            For sheet-film camera shots, identifies the holder used. When
            supplied, the holder must already have an active load; the photo
            inherits that load's film stock and the load is marked exposed on
            first use.
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        lifecycle_summary:
          oneOf:
            - $ref: "#/components/schemas/PhotographLifecycleSummary"
            - type: "null"
          description: >
            Compact lifecycle timestamps hydrated from the backing roll or
            film-holder load. This lets the detail view show Loaded, Exposed,
            and Processed without extra lifecycle lookups.
        film_id:
          type:
            - string
            - "null"
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        frame_number:
          type:
            - string
            - "null"
          example: "12"
        taken_at:
          type:
            - string
            - "null"
          format: date-time
          example: "2026-04-29T20:26:05Z"
        aperture:
          type:
            - string
            - "null"
          description: e.g. "f/5.6"
          example: "f/8"
        shutter_speed:
          type:
            - string
            - "null"
          description: Compatibility/display string, e.g. "1/250" or "bulb".
            Prefer shutter_speed_seconds and bulb_duration_seconds for
            calculation and validation.
          deprecated: true
          example: "1/500"
        shutter_speed_seconds:
          type:
            - number
            - "null"
          description: Calculation-friendly shutter speed in seconds. Bulb
            rows may mirror the measured duration here for legacy
            compatibility.
          example: 0.004
        shutter_mode:
          type: string
          enum:
            - fixed
            - bulb
          description: Structured exposure mode. Bulb rows require a positive
            bulb_duration_seconds value.
        bulb_duration_seconds:
          type:
            - number
            - "null"
          description: Measured bulb duration in seconds. Required when
            shutter_mode is bulb; null clears the bulb duration when
            converting to fixed.
          example: 12.5
        exposure_entry_mode:
          $ref: "#/components/schemas/ExposureEntryMode"
        exposure_details:
          oneOf:
            - $ref: "#/components/schemas/PhotographExposureDetails"
            - type: "null"
          description: >
            Structured historical calculation details for zone or BTZS
            workflows. Manual entries are null.
        focal_length_mm:
          type:
            - number
            - "null"
          example: 35
        latitude:
          type:
            - number
            - "null"
          example: 45.523062
        longitude:
          type:
            - number
            - "null"
          example: -122.676482
        altitude_m:
          type:
            - number
            - "null"
          example: 15.0
        gps_accuracy_m:
          type:
            - number
            - "null"
          example: 5.0
        notes:
          type:
            - string
            - "null"
          example: "Shot at sunset."
        title:
          type:
            - string
            - "null"
          description: Optional display title. Blank strings are normalized to null.
        filter_ids:
          type: array
          description: Ordered filter IDs applied to the photograph, lowest position first.
          items:
            type: string
        filters:
          type: array
          description: Selected filter records in the same order as `filter_ids`.
          items:
            $ref: "#/components/schemas/Filter"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        updated_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"
        images:
          type: array
          description: Reference images attached to the photograph, each with signed display, thumbnail, and optional original URLs.
          items:
            $ref: "#/components/schemas/PhotographImage"

    ExposureEntryMode:
      type: string
      enum:
        - manual
        - zone-metering
        - btzs-zone-metering
      description: Manual entries are the default when no exposure details are supplied.

    ManualPhotographExposureDetails:
      type: object
      maxProperties: 0
      additionalProperties: false
      description: Empty object accepted on write for manual exposure entries.

    PhotographExposureDetails:
      oneOf:
        - $ref: "#/components/schemas/PhotographZoneMeteringDetails"
        - $ref: "#/components/schemas/PhotographBtzsZoneMeteringDetails"

    PhotographZoneMeteringDetails:
      type: object
      required: [zoneMetering]
      additionalProperties: false
      properties:
        zoneMetering:
          $ref: "#/components/schemas/PhotographZoneMeteringCalculation"

    PhotographZoneMeteringCalculation:
      type: object
      required:
        - meterEV
        - meterISO
        - workingISO
        - targetZone
        - zoneAdjustedEV
        - targetEV
        - totalCompensationStops
        - aperture
        - shutterSpeed
        - rawShutterSpeedSeconds
        - finalShutterSpeedSeconds
        - shutterMode
        - bulbDurationSeconds
        - reciprocityApplied
        - warnings
      properties:
        meterEV:
          type: number
        meterISO:
          type: number
          minimum: 0
          exclusiveMinimum: true
        workingISO:
          type: number
          minimum: 0
          exclusiveMinimum: true
        targetZone:
          type: number
        zoneAdjustedEV:
          type: number
        targetEV:
          type: number
        totalCompensationStops:
          type: number
        aperture:
          type:
            - string
            - "null"
        shutterSpeed:
          type:
            - string
            - "null"
        rawShutterSpeedSeconds:
          type:
            - number
            - "null"
        finalShutterSpeedSeconds:
          type:
            - number
            - "null"
        shutterMode:
          type: string
          enum:
            - fixed
            - bulb
        bulbDurationSeconds:
          type:
            - number
            - "null"
        reciprocityApplied:
          type: boolean
        warnings:
          type: array
          items:
            type: string
      additionalProperties: true

    PhotographBtzsZoneMeteringDetails:
      type: object
      required: [btzsZoneMetering]
      additionalProperties: false
      description: Structured historical BTZS calculation details. The API preserves
        hidden drafting inputs, filter metadata, and optional supported-choice
        metadata so BTZS workflows can round-trip without a schema migration.
      properties:
        btzsZoneMetering:
          $ref: "#/components/schemas/PhotographBtzsZoneMeteringCalculation"

    PhotographBtzsZoneMeteringCalculation:
      type: object
      required:
        - profileId
        - profileName
        - lowEV
        - lowZone
        - highEV
        - highZone
        - evRange
        - zoneRange
        - sbr
        - paperEs
        - requiredG
        - effectiveFilmSpeed
        - developmentTimeMinutes
        - targetEVBeforeCompensation
        - targetEVAfterCompensation
        - aperture
        - shutterSpeed
        - rawShutterSpeedSeconds
        - finalShutterSpeedSeconds
        - shutterMode
        - bulbDurationSeconds
        - reciprocityApplied
        - warnings
      description: |
        Structured BTZS calculation details. The API keeps the historical BTZS
        summary fields, hidden workflow inputs, and optional rounded-choice
        metadata intact, while allowing historical and future keys to
        round-trip through additionalProperties.
      properties:
        profileId:
          type:
            - string
            - "null"
        profileName:
          type:
            - string
            - "null"
        meterEV:
          type:
            - number
            - "null"
          description: Hidden BTZS meter EV input, when the workflow persists it.
        meterISO:
          type:
            - number
            - "null"
          description: Hidden BTZS meter ISO input. Defaults to 100 in the web workflow.
        workingISO:
          type:
            - number
            - "null"
          description: Computed working ISO / EFS used by the BTZS workflow.
        compensationStops:
          type:
            - number
            - "null"
          description: Hidden compensation input persisted for draft round-tripping.
        filterStops:
          type:
            - number
            - "null"
          description: Filter-stop contribution that was applied to the BTZS result.
        filterIds:
          type: array
          items:
            type: string
          description: Selected filter ids captured with the BTZS calculation.
        filterFactors:
          type: array
          items:
            type: number
          description: Selected filter factors captured with the BTZS calculation.
        precedence:
          type:
            - string
            - "null"
          enum:
            - aperture
            - shutter
            - null
          description: Which control was used to resolve the final BTZS exposure.
        readingThroughSelectedFilters:
          type:
            - boolean
            - "null"
          description: Whether the BTZS meter reading already included selected filters.
        lowEV:
          type: number
        lowZone:
          type: number
        highEV:
          type: number
        highZone:
          type: number
        evRange:
          type: number
        zoneRange:
          type: number
        sbr:
          type: number
        paperEs:
          type: number
          minimum: 0
          exclusiveMinimum: true
        flareFactor:
          type:
            - number
            - "null"
          minimum: 0
        requiredG:
          type: number
          minimum: 0
          exclusiveMinimum: true
        effectiveFilmSpeed:
          type: number
          minimum: 0
          exclusiveMinimum: true
        developmentTimeMinutes:
          type: number
          minimum: 0
          exclusiveMinimum: true
        targetEVBeforeCompensation:
          type: number
        targetEVAfterCompensation:
          type: number
        aperture:
          type:
            - string
            - "null"
        shutterSpeed:
          type:
            - string
            - "null"
        rawShutterSpeedSeconds:
          type:
            - number
            - "null"
        finalShutterSpeedSeconds:
          type:
            - number
            - "null"
        shutterMode:
          type: string
          enum:
            - fixed
            - bulb
        bulbDurationSeconds:
          type:
            - number
            - "null"
        reciprocityApplied:
          type: boolean
        warnings:
          type: array
          items:
            type: string
        apertureChoice:
          $ref: "#/components/schemas/PhotographBtzsZoneMeteringApertureChoice"
        shutterChoice:
          $ref: "#/components/schemas/PhotographBtzsZoneMeteringShutterChoice"
      additionalProperties: true

    PhotographBtzsZoneMeteringApertureChoice:
      type: object
      required: [value, label, aperture, stopError, warning]
      additionalProperties: true
      description: Closest supported aperture choice for a BTZS calculation.
      properties:
        value:
          type: string
        label:
          type: string
        aperture:
          type: number
        stopError:
          type: number
        warning:
          type:
            - string
            - "null"

    PhotographBtzsZoneMeteringShutterChoice:
      type: object
      required: [value, label, seconds, stopError, warning]
      additionalProperties: true
      description: Closest supported shutter choice for a BTZS calculation.
      properties:
        value:
          type: string
        label:
          type: string
        seconds:
          type:
            - number
            - "null"
        stopError:
          type:
            - number
            - "null"
        warning:
          type:
            - string
            - "null"

    PhotographImage:
      type: object
      required: [id, photograph_id, content_type, created_at]
      properties:
        id:
          type: string
          description: ULID
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        photograph_id:
          type: string
          example: "01ARZ3NDEKTSV4RRFFQ69G5FAV"
        content_type:
          type: string
          description: MIME type, e.g. "image/jpeg"
          example: "image/jpeg"
        width:
          type:
            - integer
            - "null"
          example: 3000
        height:
          type:
            - integer
            - "null"
          example: 2000
        thumbnail_content_type:
          type:
            - string
            - "null"
          description: MIME type for the server-generated 256px thumbnail variant.
          example: "image/jpeg"
        thumbnail_width:
          type:
            - integer
            - "null"
          example: 256
        thumbnail_height:
          type:
            - integer
            - "null"
          example: 171
        thumbnail_url:
          type:
            - string
            - "null"
          description: Signed download URL for the thumbnail variant, when stored.
          example: "https://darkcloth.zone/api/photographs/01ARZ3NDEKTSV4RRFFQ69G5FAV/images/01BX5ZZKBKACTAV9WEVGEMMVS0/file?variant=thumbnail&expires=1777540800&signature=abc123"
        original_content_type:
          type:
            - string
            - "null"
          description: MIME type for the optional original upload file, if stored.
          example: "image/jpeg"
        original_width:
          type:
            - integer
            - "null"
          example: 4032
        original_height:
          type:
            - integer
            - "null"
          example: 3024
        original_filename:
          type:
            - string
            - "null"
          example: "IMG_1234.JPG"
        original_url:
          type:
            - string
            - "null"
          description: Signed download URL for the original variant, when stored.
          example: "https://darkcloth.zone/api/photographs/01ARZ3NDEKTSV4RRFFQ69G5FAV/images/01BX5ZZKBKACTAV9WEVGEMMVS0/file?variant=original&expires=1777540800&signature=abc123"
        url:
          type:
            - string
            - "null"
          description: Signed download URL for the server-generated display image backed by R2 (short-lived, about 1 hour)
          example: "https://darkcloth.zone/api/photographs/01ARZ3NDEKTSV4RRFFQ69G5FAV/images/01BX5ZZKBKACTAV9WEVGEMMVS0/file?expires=1777540800&signature=abc123"
        created_at:
          type: string
          format: date-time
          example: "2026-04-29T20:26:05Z"

  responses:
    BadRequest:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Forbidden:
      description: Signed URL is invalid or expired
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Conflict:
      description: Request conflicts with the current resource state
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    ServiceUnavailable:
      description: Image storage is unavailable
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
    filmStockId:
      name: filmStockId
      in: path
      required: true
      schema:
        type: string
    profileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
    limit:
      name: limit
      in: query
      schema:
        type: integer
        default: 50
        minimum: 1
        maximum: 200
    offset:
      name: offset
      in: query
      schema:
        type: integer
        default: 0
        minimum: 0

security:
  - bearerAuth: []

paths:
  /api/health:
    get:
      operationId: getHealth
      summary: Health check
      security: []
      responses:
        "200":
          description: Worker is reachable
          headers:
            Cache-Control:
              description: Prevents browsers and intermediaries from caching reachability checks.
              schema:
                type: string
            Pragma:
              description: Legacy no-cache directive for older clients.
              schema:
                type: string
            Expires:
              description: Legacy expiration header to reinforce no-cache semantics.
              schema:
                type: string
          content:
            application/json:
              schema:
                type: object
                required: [ok, service]
                properties:
                  ok:
                    type: boolean
                  service:
                    type: string

  # ── Auth ─────────────────────────────────────────────────────────────────────

  /api/auth/register:
