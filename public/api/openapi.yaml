      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, type]
              properties:
                name:
                  type: string
                type:
                  type: string
                  description: >
                    Film format designation, for example "127", "220", "4x5", or
                    "8x10".
                width_mm:
                  type:
                    - number
                    - "null"
                  description: Optional physical width in millimeters
                height_mm:
                  type:
                    - number
                    - "null"
                  description: Optional physical height in millimeters
                brand:
                  type:
                    - string
                    - "null"
                  description: Optional holder brand
                capacity:
                  type:
                    - number
                    - "null"
                  description: Optional number of sheet slots or pack capacity
                applicable_camera_ids:
                  type: array
                  description: Camera IDs this holder applies to. An empty array means all cameras.
                  items:
                    type: string
      responses:
        "201":
          description: Film holder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/film/holders/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getFilmHolder
      summary: Get a film holder
      responses:
        "200":
          description: Film holder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateFilmHolder
      summary: Update a film holder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                type:
                  type: string
                  description: >
                    Film format designation, for example "127", "220", "4x5", or
                    "8x10".
                width_mm:
                  type:
                    - number
                    - "null"
                  description: Optional physical width in millimeters
                height_mm:
                  type:
                    - number
                    - "null"
                  description: Optional physical height in millimeters
                brand:
                  type:
                    - string
                    - "null"
                  description: Optional holder brand
                capacity:
                  type:
                    - number
                    - "null"
                  description: Optional number of sheet slots or pack capacity
                applicable_camera_ids:
                  type: array
                  description: Camera IDs this holder applies to. An empty array means all cameras.
                  items:
                    type: string
      responses:
        "200":
          description: Updated film holder
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFilmHolder
      summary: Delete a film holder
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/holders/{id}/loads:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: listFilmHolderLoads
      summary: List film holder loads
      responses:
        "200":
          description: Film holder load history
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FilmHolderLoad"
                  total:
                    type: integer
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: loadFilmHolder
      summary: Load a film holder
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [film_id]
              properties:
                film_id:
                  type: string
                  description: Film stock to load into the holder. The film must belong to the current user and the holder must not already have an active load.
                notes:
                  type:
                    - string
                    - "null"
                  description: Optional notes for the new load.
      responses:
        "201":
          description: Film holder loaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/holders/{id}/loads/current:
    parameters:
      - $ref: "#/components/parameters/id"
    delete:
      operationId: unloadFilmHolder
      summary: Unload the current film holder load
      description: |
        Removes the active load only when it is still loaded and has no
        photographs. Exposed loads must be processed instead of emptied.
      responses:
        "200":
          description: Film holder unloaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/holders/{id}/loads/current/discard:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: discardFilmHolderLoad
      summary: Discard the current exposed holder load
      description: |
        Marks the current active exposed load as discarded so the holder can be
        re-used. Loaded-but-unexposed loads should still be unloaded with the
        current unload endpoint. Processed loads are historical and cannot be
        discarded through this path.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason:
                  type:
                    - string
                    - "null"
                  description: Optional discard reason. Defaults to "Discarded after holder was re-exposed" when omitted or blank.
                notes:
                  type:
                    - string
                    - "null"
                  description: Optional notes to store alongside the discarded load.
      responses:
        "200":
          description: Film holder load discarded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/holders/{id}/loads/current/process:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: processFilmHolderLoad
      summary: Mark the current exposed load processed
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                development_profile_id:
                  type:
                    - string
                    - "null"
                  description: Optional development profile to attach when processing the load. The profile must belong to the current user and match the load's film stock.
                notes:
                  type:
                    - string
                    - "null"
                  description: Optional notes for the processed load.
      responses:
        "200":
          description: Film holder load processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"

  /api/film/holders/{id}/loads/current/undo-exposure:
    parameters:
      - $ref: "#/components/parameters/id"
    post:
      operationId: undoFilmHolderLoadExposure
      summary: Undo exposure on the current film holder load
      description: |
        Returns the active exposed load to loaded when the exposure has not
        yet been processed. If the exposed photograph still references this
        holder, set `clear_photograph_holder` to true so the photograph can be
        detached in the same request.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                clear_photograph_holder:
                  type: boolean
                  description: Clear the linked photograph's film_holder_id when it still references this holder.
      responses:
        "200":
          description: Film holder exposure undone
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmHolder"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Gear: Filter Presets & Filters ─────────────────────────────────────────

  /api/gear/filter_presets:
    get:
      operationId: listFilterPresets
      summary: List standard filter presets
      description: |
        Preset factors are approximate. They are film-response dependent and
        based on daylight color-temperature workflows; use film-specific testing
        as needed.
      responses:
        "200":
          description: Standard filter preset list
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FilterPreset"

  /api/gear/filters:
    get:
      operationId: listFilters
      summary: List filters
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Filter list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Filter"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createFilter
      summary: Add a filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              description: >
                Create either a custom filter (`name` + `filter_factor`) or a
                preset-based filter (set `standard_key` and optionally override
                `name`, `filter_factor`, or `code`). Optional `notes` and
                `applicable_lens_ids` may also be set.
              properties:
                name:
                  type: string
                filter_factor:
                  type: number
                  description: >
                    Positive finite factor (for example `8` or `2.5`).
                  minimum: 0
                  exclusiveMinimum: true
                code:
                  type:
                    - string
                    - "null"
                standard_key:
                  type:
                    - string
                    - "null"
                  description: Optional preset key used as a basis.
                notes:
                  type:
                    - string
                    - "null"
                  description: Optional free-form filter notes.
                applicable_lens_ids:
                  type: array
                  description: Lens IDs this filter applies to. Empty means all.
                  items:
                    type: string
      responses:
        "201":
          description: Filter created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Filter"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/gear/filters/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getFilter
      summary: Get a filter
      responses:
        "200":
          description: Filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Filter"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateFilter
      summary: Update a filter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                filter_factor:
                  type: number
                  minimum: 0
                  exclusiveMinimum: true
                code:
                  type:
                    - string
                    - "null"
                standard_key:
                  type:
                    - string
                    - "null"
                  description: >
                    Optional preset key used to identify source factor behavior.
                notes:
                  type:
                    - string
                    - "null"
                  description: Optional free-form filter notes.
                applicable_lens_ids:
                  type: array
                  description: Lens IDs this filter applies to. Empty means all.
                  items:
                    type: string
      responses:
        "200":
          description: Updated filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Filter"
        "400":
          $ref: "#/components/responses/BadRequest"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFilter
      summary: Delete a filter
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Gear: Lenses ──────────────────────────────────────────────────────────────

  /api/gear/lenses:
    get:
      operationId: listLenses
      summary: List lenses
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Lens list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Lens"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createLens
      summary: Add a lens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                focal_length_mm:
                  type: number
                  description: >
                    Legacy single focal-length value; if min/max fields are not
                    provided, this is mapped to both min_focal_length_mm and
                    max_focal_length_mm.
                max_aperture:
                  type: string
                min_f_stop:
                  type: number
                  default: 5.6
                  example: 5.6
                max_f_stop:
                  type: number
                  default: 32
                  example: 32
                min_focal_length_mm:
                  type: number
                max_focal_length_mm:
                  type: number
                applicable_camera_ids:
                  type: array
                  description: Camera IDs this lens is applicable to. An empty array means all cameras.
                  items:
                    type: string
                has_shutter:
                  type: boolean
                  description: Explicit shutter capability flag. When false,
                    shutter range fields are normalized to null and
                    supports_bulb is false.
                min_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Minimum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 0.00025
                max_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Maximum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 1
                supports_bulb:
                  type: boolean
                  description: Bulb support. Normalized to false when
                    has_shutter is false.
                aperture_increment:
                  type: string
                  enum:
                    - full
                    - half
                    - third
                flare_factor:
                  type: number
                  description: Lens flare factor used by BTZS exposure calculations.
                  default: 0.02
                  minimum: 0
      responses:
        "201":
          description: Lens created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lens"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/gear/lenses/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getLens
      summary: Get a lens
      responses:
        "200":
          description: Lens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lens"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateLens
      summary: Update a lens
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                focal_length_mm:
                  type: number
                  description: >
                    Legacy single focal-length value; if min/max fields are not
                    provided, this is mapped to both min_focal_length_mm and
                    max_focal_length_mm.
                min_focal_length_mm:
                  type: number
                max_focal_length_mm:
                  type: number
                max_aperture:
                  type: string
                min_f_stop:
                  type: number
                max_f_stop:
                  type: number
                has_shutter:
                  type: boolean
                  description: Explicit shutter capability flag. When false,
                    shutter range fields are normalized to null and
                    supports_bulb is false.
                min_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Minimum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 0.00025
                max_shutter_speed_seconds:
                  type:
                    - number
                    - "null"
                  description: >
                    Maximum supported shutter speed in seconds. Valid only when
                    has_shutter is true.
                  minimum: 0
                  exclusiveMinimum: true
                  example: 1
                supports_bulb:
                  type: boolean
                  description: Bulb support. Normalized to false when
                    has_shutter is false.
                aperture_increment:
                  type: string
                  enum:
                    - full
                    - half
                    - third
                flare_factor:
                  type: number
                  description: Lens flare factor used by BTZS exposure calculations.
                  minimum: 0
                applicable_camera_ids:
                  type: array
                  description: Camera IDs this lens is applicable to. An empty array means all cameras.
                  items:
                    type: string
      responses:
        "200":
          description: Updated lens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Lens"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteLens
      summary: Delete a lens
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Film Resources: Stocks ────────────────────────────────────────────────────

  /api/film/stocks:
    get:
      operationId: listFilmStocks
      summary: List film stocks
      parameters:
        - $ref: "#/components/parameters/limit"
        - $ref: "#/components/parameters/offset"
      responses:
        "200":
          description: Film stock list
          content:
            application/json:
              schema:
                type: object
                required: [items, total]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FilmStock"
                  total:
                    type: integer
        "401":
          $ref: "#/components/responses/Unauthorized"
    post:
      operationId: createFilmStock
      summary: Add a film stock
      description: >
        `stock_type` is optional on create and defaults to `other` when
        omitted. `reciprocity_p_factor` is optional and defaults to `1` when
        omitted. Use `bw` (B&W Negative) to unlock BTZS development profiles.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                iso:
                  type: integer
                process:
                  type: string
                stock_type:
                  $ref: "#/components/schemas/FilmStockType"
                reciprocity_p_factor:
                  type: number
                  description: Exposure reciprocity P factor. Omit on create to use the default value of 1.
                  minimum: 0
                  exclusiveMinimum: true
                  default: 1
      responses:
        "201":
          description: Film stock created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmStock"
        "400":
          $ref: "#/components/responses/BadRequest"

  /api/film/stocks/{id}:
    parameters:
      - $ref: "#/components/parameters/id"
    get:
      operationId: getFilmStock
      summary: Get a film stock
      responses:
        "200":
          description: Film stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmStock"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      operationId: updateFilmStock
      summary: Update a film stock
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                iso:
                  type: integer
                process:
                  type: string
                stock_type:
                  $ref: "#/components/schemas/FilmStockType"
                reciprocity_p_factor:
                  type: number
                  description: Exposure reciprocity P factor. Send a finite positive number greater than 0 to update the stored value.
                  minimum: 0
                  exclusiveMinimum: true
      responses:
        "200":
          description: Updated film stock
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FilmStock"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      operationId: deleteFilmStock
      summary: Delete a film stock
      responses:
        "204":
          description: Deleted
        "404":
          $ref: "#/components/responses/NotFound"

