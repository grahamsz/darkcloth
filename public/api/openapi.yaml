                $ref: "#/components/schemas/DevelopmentProfileList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      operationId: createDevelopmentProfile
      summary: Create a development profile
